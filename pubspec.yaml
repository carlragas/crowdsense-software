publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  font_awesome_flutter: ^10.6.0
  animate_do: ^3.3.2
  glassmorphism: ^3.0.0
  provider: ^6.1.5+1
  window_manager: ^0.3.9
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
